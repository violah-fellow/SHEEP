# environment.yml
name: sheep
channels:
  - pytorch
  - conda-forge
  - pip
  - defaults
dependencies:
  - python=3.12
  - pip
  - pytorch
  - cpuonly # uncomment for use with GPU
  # - pytorch-cuda=CUDA version # uncommment for use with GPU 
  - numpy
  - pandas
  - matplotlib
  - seaborn
  - python-duckdb # DuckDB for SQL
  - ipykernel
  - scikit-learn
  - joblib # For saving models and parallel processing
  - tqdm # Progress bars
  - anthropic>=0.103.0 # Anthropic API client (0.103.0 verified working with messages.parse())
  - pydantic>=2.0 # Structured output schemas; also a dependency of anthropic
  - python-dotenv # For loading environment variables from .env files
  - openpyxl # Excel file support for pandas
  - pip:
    - dimcli # Dimensions API client
    - transformers # Hugging Face Transformers for NLP
    - sentence-transformers # Sentence Transformers for embeddings



